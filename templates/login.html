<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — Disease Prediction System</title>
<style>
    :root {
        --bg: #eef1f6;
        --card: #ffffff;
        --ink: #1f2937;
        --muted: #6b7280;
        --brand: #2c63d6;
        --brand-dark: #1f4aa8;
        --brand-soft: #e8f0ff;
        --line: #e2e6ed;
        --error-bg: #fff2f2;
        --error-line: #e0584f;
        --error-ink: #b3271e;
        --radius: 12px;
    }
    * { box-sizing: border-box; }
    body {
        font-family: "Segoe UI", "Noto Sans Bengali", Arial, sans-serif;
        max-width: 420px;
        margin: 60px auto 80px;
        background: var(--bg);
        color: var(--ink);
        padding: 0 16px;
        line-height: 1.5;
    }
    h1 {
        text-align: center;
        color: #16233f;
        font-size: 1.5rem;
        margin-bottom: 4px;
    }
    .subtitle {
        text-align: center;
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 24px;
    }
    .card {
        background: var(--card);
        padding: 24px;
        border-radius: var(--radius);
        box-shadow: 0 2px 10px rgba(20, 30, 60, 0.06);
        border: 1px solid var(--line);
    }
    .field { margin-bottom: 16px; }
    label {
        font-weight: 600;
        display: block;
        margin-bottom: 6px;
        font-size: 0.9rem;
    }
    input {
        width: 100%;
        padding: 11px 12px;
        border-radius: 8px;
        border: 1px solid #ccd3df;
        font-size: 0.95rem;
        outline: none;
        background: #fbfcfe;
        transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 3px var(--brand-soft);
        background: #fff;
    }
    button[type="submit"] {
        margin-top: 8px;
        width: 100%;
        background: var(--brand);
        color: #fff;
        border: none;
        padding: 13px 20px;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
    }
    button[type="submit"]:hover { background: var(--brand-dark); }
    .switch-link {
        text-align: center;
        margin-top: 16px;
        font-size: 0.9rem;
        color: var(--muted);
    }
    .switch-link a {
        color: var(--brand);
        font-weight: 600;
        text-decoration: none;
    }
    .switch-link a:hover { text-decoration: underline; }
    .flash {
        background: var(--error-bg);
        border-left: 4px solid var(--error-line);
        color: var(--error-ink);
        padding: 12px 14px;
        border-radius: 8px;
        margin-bottom: 18px;
        font-size: 0.88rem;
    }
</style>
</head>
<body>

    <h1>🩺 লগইন করুন</h1>
    <p class="subtitle">Disease prediction দেখার জন্য আগে লগইন করুন</p>

    <div class="card">
        {% if error %}
            <div class="flash">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="field">
                <label for="email">ইমেইল (Email)</label>
                <input type="email" id="email" name="email" required autofocus value="{{ email if email else '' }}">
            </div>

            <div class="field">
                <label for="password">পাসওয়ার্ড (Password)</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit">Login</button>
        </form>

        <p class="switch-link">নতুন user? <a href="{{ url_for('register') }}">Register করুন</a></p>
    </div>

</body>
</html>
